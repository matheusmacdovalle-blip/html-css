<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixas</title>
    <style>
        h1 {
            height: 300px;
            width: 300px;
            background-color: burlywood;
            text-align: center;
            border-width: 10px;
            border-style: solid;
            border-color: chocolate;

            padding-top: 10px;
            padding-left: 10px;
            padding-right: 10px;
            padding-bottom: 10px;

            margin-top: 10px;
            margin-right: 10px;
            margin-bottom: 10px;
            margin-left: 10px;
            margin: auto;

            outline-width: 5px;
            outline-style: dashed;
            outline-color: crimson;
        }
        a {
            border-color: brown;
            border-style: solid;
            border-width: 8px;

            padding-top: 10px;
            padding-left: 10px;
            padding-right: 10px;
            padding-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>Exemplo de caixas box-level</h1>
    <p>paragrafos tambem sao exemplos de box-level, mas os
        <a href="#">links sao exemplos de caixas inline-level</a>. 
        Vamos ver como tudo isso funciona
    </p>
</body>
</html>
