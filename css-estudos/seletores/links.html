<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Links</title>
</head>
<style>
    body {
        font-family: Arial, Helvetica, sans-serif
    }
    a {
        color: brown;
        text-decoration: none;
        font-weight: bold;
    }
    a:visited {
        color: blueviolet;
    }
    a:hover {
        text-decoration: underline;
    }
    a:active {
        color: crimson;
    }
    a::after {
    content: '[link]';
    text-decoration: none;
    font-weight: normal;
    color: rgb(42, 160, 160);
    }
</style>
<body>
    <h1>personalizando links </h1>
    <ul type="disc">
        <li><a href="https://gustavoguanabara.github.io">repositorio do github</a></li>
        <li><a href="https://youtube.com/cursoemvideo/">canal do youtube</a></li>
        <li><a href="https://"www.cursoemvideo.com>site do cursoemvideo</a></li>
    </ul>
</body>
</html>
